name: 🚀 Deploy Backend (Laravel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Deploy backend via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 START DEPLOY BACKEND"

            docker exec -i laravel_app bash -c "
              set -e

              cd /var/www &&

              echo '📥 Pull latest code' &&
              git fetch --all &&
              git reset --hard origin/main &&

              echo '📦 Install dependency' &&
              composer install --no-dev --optimize-autoloader &&

              echo '🧹 Clear old cache (PENTING)' &&
              php artisan config:clear &&
              php artisan cache:clear &&
              php artisan route:clear &&
              php artisan view:clear &&

              echo '🧱 Run migration' &&
              php artisan migrate --force &&

              echo '🌱 Run seeder (opsional tapi aman)' &&
              php artisan db:seed --force &&

              echo '⚡ Cache ulang config (BIAR CEPAT)' &&
              php artisan config:cache &&
              php artisan route:cache
            "

            echo "✅ BACKEND DEPLOY DONE"